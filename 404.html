<!DOCTYPE html>
<html lang="en-NZ">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Mutual Solutions</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
      background: #fff; color: #0a0a0a;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 40px 24px; text-align: center;
    }
    .wrap { max-width: 480px; }
    .num {
      font-size: 120px; font-weight: 800; letter-spacing: -8px;
      line-height: 1; color: #f0f0f0; margin-bottom: 8px;
    }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 16px; }
    p { font-size: 16px; color: #6b6b6b; line-height: 1.7; margin-bottom: 36px; }
    .btn {
      display: inline-block; background: #0a0a0a; color: #fff;
      padding: 14px 32px; border-radius: 100px;
      font-size: 14px; font-weight: 600; text-decoration: none;
      margin: 6px;
      transition: opacity .2s;
    }
    .btn:hover { opacity: .8; }
    .btn-outline {
      background: transparent; color: #0a0a0a;
      border: 1px solid rgba(0,0,0,0.2);
    }
    .logo { font-size: 15px; font-weight: 700; margin-bottom: 48px; color: #0a0a0a; text-decoration: none; display: block; }
  </style>
  <script>
    // Auto-redirect after 5 seconds
    setTimeout(function() { window.location.href = '/'; }, 5000);
  </script>
</head>
<body>
  <div class="wrap">
    <a href="/" class="logo">Mutual Solutions</a>
    <div class="num">404</div>
    <h1>Page not found</h1>
    <p>This page no longer exists or has been moved. You'll be redirected to our homepage in 5 seconds, or click below.</p>
    <a href="/" class="btn">Go to Homepage</a>
    <a href="/blog/" class="btn btn-outline">Visit Blog</a>
  </div>
</body>
</html>
